<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sweet Angels Selfie Booth</title>
    
    <!-- Mobile App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; background-color: #f8fafc; }
        .hidden { display: none !important; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce-slow { animation: bounce-slow 3s infinite ease-in-out; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite ease-in-out; }
        
        /* Smooth transitions for screens */
        .screen-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50">

    <div id="app-root" class="min-h-screen flex flex-col items-center">
        
        <!-- HOME SCREEN -->
        <div id="screen-home" class="w-full max-w-6xl px-6 py-12 md:py-16 flex flex-col items-center screen-fade">
            <div class="flex flex-col items-center mb-10">
                <div class="flex items-center gap-2 mb-1">
                    <span class="text-pink-400 text-4xl">👶</span>
                    <h1 class="text-4xl md:text-6xl font-black text-blue-500 tracking-tight text-center">
                        SWEET <span class="text-pink-400">ANGELS</span>
                    </h1>
                </div>
                <p class="text-sm font-bold tracking-[0.4em] text-gray-400 uppercase">Heaven4Kids</p>
            </div>

            <div class="relative w-full max-w-md mb-12 group">
                <div class="absolute -top-6 -left-6 bg-white shadow-xl p-4 rounded-full animate-bounce-slow z-10 border border-blue-50 text-2xl">👶</div>
                <div class="absolute -bottom-6 -right-6 bg-white shadow-xl p-4 rounded-full animate-pulse-soft z-10 border border-pink-50 text-2xl">❤️</div>
                <div class="bg-white p-5 rounded-[2.5rem] shadow-2xl transform rotate-1 transition-transform duration-500 overflow-hidden border-4 border-white">
                    <div class="aspect-[4/3] bg-gradient-to-br from-blue-100 via-white to-pink-100 rounded-3xl flex flex-col items-center justify-center relative">
                        <div class="bg-white/80 px-8 py-3 rounded-full backdrop-blur-md shadow-lg text-blue-600 font-black text-2xl">
                            HAPPY CUSTOMERS
                        </div>
                    </div>
                </div>
            </div>

            <!-- "Take a Selfie" Button -->
            <button id="btn-start" class="group relative inline-flex items-center justify-center px-12 py-7 font-black text-2xl text-white transition-all duration-300 bg-blue-500 rounded-3xl hover:bg-blue-600 active:scale-95 shadow-[0_20px_40px_rgba(59,130,246,0.3)] mb-20">
                📸 TAKE A SELFIE
            </button>

            <!-- Wall of Smiles -->
            <div class="w-full max-w-5xl">
                <div class="flex items-center justify-between mb-10 border-b border-slate-200 pb-6">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-500 p-2 rounded-xl"><span class="text-white text-xl">⭐</span></div>
                        <h3 class="text-3xl font-black text-slate-700 tracking-tight">Wall of Smiles</h3>
                    </div>
                    <p id="cloud-status" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">● Live Sync Active</p>
                </div>
                <div id="gallery-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
                <div id="gallery-empty" class="bg-white border-4 border-dashed border-slate-100 rounded-[3rem] p-20 text-center">
                    <p class="text-slate-400 font-bold text-xl">Be the first to join our Wall of Fame!</p>
                </div>
            </div>
        </div>

        <!-- CAMERA SCREEN -->
        <div id="screen-camera" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-50 hidden screen-fade">
            <div class="relative w-full max-w-2xl h-full max-h-[85vh] sm:max-h-none sm:aspect-square bg-black overflow-hidden sm:rounded-[3rem] shadow-2xl border-8 border-white/5">
                <video id="video" autoplay playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
                <div class="absolute inset-0 pointer-events-none border-[20px] border-blue-400/10">
                    <div class="absolute top-0 left-0 right-0 h-20 bg-white/95 flex items-center justify-center">
                        <span class="text-blue-600 font-black tracking-widest text-xs sm:text-lg">SWEET ANGELS - HAPPY CUSTOMER</span>
                    </div>
                    <div class="absolute bottom-0 left-0 right-0 h-20 bg-white/95 flex items-center justify-center">
                        <span class="text-pink-500 font-black tracking-widest text-xs sm:text-lg">I LOVE SHOPPING AT SWEET ANGELS</span>
                    </div>
                </div>
                <div id="countdown-overlay" class="absolute inset-0 bg-black/40 flex items-center justify-center hidden">
                    <div id="countdown-text" class="text-white text-[15rem] font-black">5</div>
                </div>
            </div>
            <div class="mt-10 flex gap-10 items-center">
                <button id="btn-home" class="bg-white/10 p-6 rounded-full text-white text-3xl">🏠</button>
                <button id="btn-capture" class="bg-white p-10 rounded-full text-blue-500 border-[12px] border-blue-50 text-5xl">📸</button>
                <button id="btn-switch" class="bg-white/10 p-6 rounded-full text-white text-3xl">🔄</button>
            </div>
        </div>

        <!-- PREVIEW SCREEN -->
        <div id="screen-preview" class="fixed inset-0 bg-white/98 backdrop-blur-2xl flex flex-col items-center justify-center z-[60] p-8 hidden screen-fade">
            <div class="max-w-xl w-full flex flex-col items-center">
                <div id="upload-status" class="bg-blue-500 text-white px-8 py-3 rounded-full font-black text-sm mb-8">SAVING PHOTO...</div>
                
                <div class="bg-white shadow-2xl rounded-[3rem] overflow-hidden border-[15px] border-white transform -rotate-1 relative">
                    <img id="preview-img" src="" alt="Selfie" class="w-full h-auto">
                </div>

                <div class="mt-12 flex flex-col sm:flex-row gap-4 w-full">
                    <button id="btn-share" class="flex-1 bg-green-500 text-white py-6 rounded-3xl font-black text-xl shadow-lg">📤 SHARE TO GOOGLE</button>
                    <button id="btn-retake" class="flex-1 bg-slate-100 text-slate-500 py-6 rounded-3xl font-black text-xl">🔄 RETAKE</button>
                    <button id="btn-done" class="flex-1 bg-blue-500 text-white py-6 rounded-3xl font-black text-xl shadow-2xl">✅ DONE</button>
                </div>
            </div>
        </div>

        <!-- THANK YOU SCREEN -->
        <div id="screen-thankyou" class="fixed inset-0 bg-blue-500 flex flex-col items-center justify-center z-[100] text-white text-center p-8 hidden screen-fade">
            <div class="w-48 h-48 bg-white/20 rounded-full flex items-center justify-center mb-10 text-7xl animate-pulse">❤️</div>
            <h1 class="text-7xl font-black mb-8">THANK YOU!</h1>
            <p class="text-3xl font-bold opacity-90">Visit Heaven4Kids Again Soon</p>
        </div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment variables or local fallbacks
        const firebaseConfigRaw = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sweet-angels-default';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db = null;
        let auth = null;

        // Initialize Firebase safely
        if (firebaseConfigRaw) {
            try {
                const app = initializeApp(JSON.parse(firebaseConfigRaw));
                auth = getAuth(app);
                db = getFirestore(app);
                
                const initAuth = async () => {
                    if (initialToken) {
                        await signInWithCustomToken(auth, initialToken);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                
                onAuthStateChanged(auth, (user) => {
                    state.user = user;
                    if (user) startGalleryListener();
                });
                
                initAuth();
            } catch (e) {
                console.warn("Cloud features disabled: Config missing or invalid.");
            }
        }

        const state = {
            stream: null,
            facingMode: 'user',
            recentPhotos: JSON.parse(localStorage.getItem('sweet_angels_local_cache') || '[]'),
            user: null,
            currentPhotoUrl: null
        };

        const screens = ['home', 'camera', 'preview', 'thankyou'];

        // Initial Gallery Load (Local)
        updateGallery();

        function startGalleryListener() {
            if (!db || !state.user) return;
            const selfieCollection = collection(db, 'artifacts', appId, 'public', 'data', 'selfies');
            const q = query(selfieCollection);
            
            onSnapshot(q, (snapshot) => {
                const photos = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data && data.image) {
                        photos.push({ image: data.image, timestamp: data.timestamp || 0 });
                    }
                });
                photos.sort((a, b) => b.timestamp - a.timestamp);
                state.recentPhotos = photos.map(p => p.image).slice(0, 24);
                localStorage.setItem('sweet_angels_local_cache', JSON.stringify(state.recentPhotos));
                updateGallery();
            }, (error) => {
                document.getElementById('cloud-status').innerText = "● Local Mode";
            });
        }

        // Global functions attached to window for HTML access
        window.startCamera = async function() {
            try {
                if (state.stream) stopCamera();
                state.stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: state.facingMode, width: { ideal: 1080 }, height: { ideal: 1080 } },
                    audio: false
                });
                document.getElementById('video').srcObject = state.stream;
                showScreen('camera');
            } catch (err) { 
                console.error(err);
                alert("Camera error: Please ensure you have given permission to use the camera."); 
            }
        };

        window.stopCamera = function() {
            if (state.stream) {
                state.stream.getTracks().forEach(t => t.stop());
                state.stream = null;
            }
        };

        window.switchCamera = function() {
            state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
            const video = document.getElementById('video');
            if (video) video.classList.toggle('scale-x-[-1]', state.facingMode === 'user');
            window.startCamera();
        };

        window.goHome = function() {
            window.stopCamera();
            showScreen('home');
        };

        window.initiateCapture = function() {
            const overlay = document.getElementById('countdown-overlay');
            const text = document.getElementById('countdown-text');
            overlay.classList.remove('hidden');
            let count = 5;
            text.innerText = count;
            const timer = setInterval(() => {
                count--;
                text.innerText = count;
                if (count === 0) {
                    clearInterval(timer);
                    overlay.classList.add('hidden');
                    capture();
                }
            }, 1000);
        };

        async function capture() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const s = 1080;
            canvas.width = s;
            canvas.height = s;

            ctx.save();
            if (state.facingMode === 'user') {
                ctx.scale(-1, 1);
                ctx.translate(-s, 0);
            }

            const videoRatio = video.videoWidth / video.videoHeight;
            let dw, dh, ox, oy;
            if (videoRatio > 1) {
                dh = s; dw = s * videoRatio;
                ox = (s - dw) / 2; oy = 0;
            } else {
                dw = s; dh = s / videoRatio;
                ox = 0; oy = (s - dh) / 2;
            }
            ctx.drawImage(video, ox, oy, dw, dh);
            ctx.restore();
            
            drawFrame(ctx, s);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            state.currentPhotoUrl = dataUrl;
            document.getElementById('preview-img').src = dataUrl;
            
            showScreen('preview');
            window.stopCamera();
            
            // Sync to Cloud if available
            if (db && state.user) {
                const statusEl = document.getElementById('upload-status');
                statusEl.innerText = "SAVING TO CLOUD...";
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'selfies'), {
                        image: dataUrl,
                        timestamp: Date.now()
                    });
                    statusEl.innerText = "SAVED TO CLOUD ✅";
                    statusEl.className = "bg-green-500 text-white px-8 py-3 rounded-full font-black text-sm mb-8";
                } catch (e) {
                    statusEl.innerText = "SAVED LOCALLY 💾";
                }
            } else {
                document.getElementById('upload-status').innerText = "SAVED LOCALLY 💾";
            }

            // Local fallback save
            if (!state.recentPhotos.includes(dataUrl)) {
                state.recentPhotos.unshift(dataUrl);
                state.recentPhotos = state.recentPhotos.slice(0, 24);
                localStorage.setItem('sweet_angels_local_cache', JSON.stringify(state.recentPhotos));
                updateGallery();
            }

            // Trigger Download
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = `SweetAngelsSelfie_${Date.now()}.jpg`;
            link.click();
            
            state.timeout = setTimeout(window.showThankYou, 10000);
        }

        function drawFrame(ctx, s) {
            ctx.strokeStyle = '#60A5FA';
            ctx.lineWidth = 40;
            ctx.strokeRect(20, 20, s - 40, s - 40);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.fillRect(0, 0, s, 140);
            ctx.fillStyle = '#3B82F6';
            ctx.font = 'bold 48px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('SWEET ANGELS - HAPPY CUSTOMER', s / 2, 90);

            ctx.fillRect(0, s - 140, s, 140);
            ctx.fillStyle = '#F472B6';
            ctx.font = 'bold 42px sans-serif';
            ctx.fillText('I LOVE SHOPPING AT SWEET ANGELS', s / 2, s - 60);
        }

        function updateGallery() {
            const grid = document.getElementById('gallery-grid');
            const empty = document.getElementById('gallery-empty');
            if (state.recentPhotos.length > 0) {
                empty.classList.add('hidden');
                grid.innerHTML = state.recentPhotos.map(src => `
                    <div class="aspect-square rounded-[2rem] overflow-hidden shadow-lg border-4 border-white animate-in fade-in zoom-in duration-300">
                        <img src="${src}" class="w-full h-full object-cover" loading="lazy">
                    </div>
                `).join('');
            }
        }

        window.sharePhoto = async function() {
            if (navigator.share) {
                try {
                    const blob = await (await fetch(state.currentPhotoUrl)).blob();
                    const file = new File([blob], 'sweet-angels-selfie.jpg', { type: 'image/jpeg' });
                    await navigator.share({
                        files: [file],
                        title: 'Sweet Angels Selfie',
                        text: 'Had a heavenly time at Sweet Angels Heaven4Kids!'
                    });
                } catch (err) {
                    window.open('https://www.google.com/search?q=Sweet+Angels+Heaven4Kids#lrd=0x0:0x0,3', '_blank');
                }
            } else {
                window.open('https://www.google.com/search?q=Sweet+Angels+Heaven4Kids#lrd=0x0:0x0,3', '_blank');
            }
        };

        function showScreen(id) {
            screens.forEach(s => document.getElementById(`screen-${s}`).classList.add('hidden'));
            document.getElementById(`screen-${id}`).classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        window.showThankYou = function() {
            clearTimeout(state.timeout);
            showScreen('thankyou');
            setTimeout(() => showScreen('home'), 3000);
        };

        // Attach Event Listeners explicitly to ensure responsiveness
        document.getElementById('btn-start').addEventListener('click', window.startCamera);
        document.getElementById('btn-home').addEventListener('click', window.goHome);
        document.getElementById('btn-capture').addEventListener('click', window.initiateCapture);
        document.getElementById('btn-switch').addEventListener('click', window.switchCamera);
        document.getElementById('btn-share').addEventListener('click', window.sharePhoto);
        document.getElementById('btn-retake').addEventListener('click', window.startCamera);
        document.getElementById('btn-done').addEventListener('click', window.showThankYou);

    </script>
</body>
</html>
